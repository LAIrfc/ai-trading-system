# 交易成本与延迟（V3.3）
# 回测/实盘均使用，每月复盘实际与预设差异，偏差超 0.02% 则调整

slippage_bps: 5          # 滑点：买入 +0.05%，卖出 -0.05%
commission_bps: 1.5      # 佣金 万分之 1.5（买卖均收）
stamp_tax_bps: 10       # 印花税 千分之一，仅卖出（10 bp = 0.1%）

# 总成本近似（用于说明）
# 买入总成本约 0.065%（滑点 0.05% + 佣金 0.015%）
# 卖出总成本约 0.165%（滑点 0.05% + 佣金 0.015% + 印花税 0.1%）

delay:
  signal_to_order_minutes: 5    # 信号生成后延迟 5 分钟下单
  post_market_news_next_open: true   # 盘后新闻/政策次日开盘生效
  lhb_t2_open: true            # 龙虎榜 T+1 披露，信号 T+2 开盘执行
  lhb_t2_open_after_minutes: 15  # T+2 开盘后 15 分钟生成信号（可选）
