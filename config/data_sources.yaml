# 策略数据源配置（V3.4）
# 占位 [指定数据商] 在接入前可替换为 akshare / tushare / Wind 等

# 所有数据源配置统一在此维护，换源只改这里，代码无需修改
kline:
  # 股票 K 线数据源顺序（互斥降级：主源失败自动切换备用）
  # 可选: sina, eastmoney, tencent, tushare, baostock
  sources: [sina, eastmoney, tencent, tushare, baostock]
  # ETF K 线数据源顺序（互斥降级，自动识别 5/159 开头的 6 位代码）
  # 可选: local_cache, akshare_etf, push2his_etf, baostock_etf
  etf_sources: [local_cache, akshare_etf, push2his_etf, baostock_etf]

# 盘中实时行情（自动拼接到日K线末尾，无需手动调用）
# get_kline 返回前，若最新K线不是今天且处于交易时段，自动降级获取当天OHLCV
# 降级顺序: eastmoney_push2 → sina_hq → 放弃（不影响历史K线数据）
realtime:
  sources: [eastmoney_push2, sina_hq]
  enabled: true

sector:
  # 板块成分股数据源顺序（全量合并：所有源都尝试，结果去重后按市值排序）
  # 可选: akshare, eastmoney, sina, baostock, local
  sources: [akshare, eastmoney, sina, baostock, local]

sentiment:
  # 情绪因子所需指标，缺项权重置 0 并归一化
  advance_decline_ratio:   # 涨跌家数比，日频
    source: akshare  # 或 [指定数据商]，需提供历史日频
    update: daily
  turnover_rate:           # 换手率（市场/指数）
    source: akshare
    update: daily
  margin_buy_ratio:        # 融资买入占比
    source: akshare        # stock_margin_sse / stock_margin_sz 等
    update: daily
  option_pcr:              # 期权 PCR，可选
    source: null           # 暂无则权重 0
    update: daily
  new_high_low_ratio:      # 新高新低比
    source: akshare
    update: daily
  volatility_index:        # 波动率，默认用沪深300的HV20替代VIX
    source: akshare
    proxy: index_hv20      # 沪深300 20日历史波动率
    update: daily
  index_daily:             # 指数日线（沪深300等）
    symbol: "000300"
    source: akshare
    update: daily

news:
  source: akshare          # 东方财富等，见 news_source_weights
  update: realtime

policy:
  source: crawl            # 政府官网 + 财经媒体
  update: daily

industry:
  # 申万二级行业指数，供消息/政策“板块涨幅”“行业市值占比”
  standard: sw_level2      # 申万二级
  code_source: "[指定数据商]"  # 如 Wind .WI

money_flow:
  lhb: akshare             # 龙虎榜
  block_trade: akshare     # 大宗交易
  update: T+1
