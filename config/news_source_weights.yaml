# 新闻源权重（V3.3 消息面）
# 最终置信度 = min(基础置信度 × 新闻源权重, 1)

default: 1.0

sources:
  # 交易所公告
  - names: ["上交所", "深交所", "上交所官网", "深交所官网", "交易所公告"]
    weight: 1.5
  # 主流财经媒体
  - names: ["财联社", "财联社官方", "中国证券报", "上海证券报", "证券时报", "东方财富", "同花顺", "第一财经"]
    weight: 1.2
  # 自媒体 / 其他
  - names: ["自媒体", "其他"]
    weight: 0.5

# 匹配逻辑：新闻来源字段与 names 中任一匹配（包含或相等），取对应 weight；否则用 default
